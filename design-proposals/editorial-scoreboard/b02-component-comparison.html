  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;body&gt;
&lt;div id=&quot;b02-component-comparison&quot; data-component=&quot;page-header&quot;&gt;
  &lt;style&gt;
    @import url(&quot;https://fonts.googleapis.com/css2?family=Anton&amp;family=JetBrains+Mono:wght@400;500&amp;family=Space+Grotesk:wght@400;500&amp;display=swap&quot;);

    #b02-component-comparison {
      --canvas: #131313;
      --panel: #1a1a1a;
      --raised: #232323;
      --inset: #0f0f0f;
      --text-strong: #ffffff;
      --text: #dedede;
      --text-soft: #b9b9b9;
      --text-muted: #949494;
      --brand: #43f2c8;
      --brand-soft: rgb(67 242 200 / 10%);
      --border-subtle: rgb(255 255 255 / 7.5%);
      --border-structural: rgb(255 255 255 / 13%);
      --focus: rgb(67 242 200 / 88%);
      --s1: 4px;
      --s2: 8px;
      --s3: 12px;
      --s4: 16px;
      --s5: 24px;
      --s6: 32px;
      position: relative;
      isolation: isolate;
      padding: var(--s4) 0;
      color: var(--text);
      background:
        radial-gradient(circle at 84% 66%, rgb(67 242 200 / 6%), transparent 30%),
        var(--canvas);
      font-family: &quot;Space Grotesk&quot;, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    #b02-component-comparison::before {
      position: absolute;
      z-index: -1;
      inset: 0;
      opacity: .55;
      background-image:
        linear-gradient(rgb(255 255 255 / 2%) 1px, transparent 1px),
        linear-gradient(90deg, rgb(255 255 255 / 2%) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, transparent, black 22%, black 88%, transparent);
      content: &quot;&quot;;
    }

    #b02-component-comparison * {
      box-sizing: border-box;
    }

    #b02-component-comparison button {
      color: inherit;
      font: inherit;
    }

    #b02-component-comparison button:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }

    .bcc-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--s4);
      padding-bottom: var(--s4);
      border-bottom: 1px solid var(--border-subtle);
    }

    .bcc-kicker,
    .bcc-option-label,
    .bcc-note,
    .bcc-meta,
    .bcc-fact {
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-variant-numeric: tabular-nums;
    }

    .bcc-kicker {
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .bcc-controls {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 2px;
      padding: 2px;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      background: rgb(26 26 26 / 82%);
      backdrop-filter: blur(10px);
    }

    .bcc-control {
      min-height: 32px;
      padding: 0 var(--s3);
      border: 0;
      border-radius: 3px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 10px;
    }

    .bcc-control:hover {
      background: var(--raised);
      color: var(--text-strong);
    }

    .bcc-control[aria-pressed=&quot;true&quot;] {
      background: var(--brand);
      color: #081510;
    }

    .bcc-stage {
      padding-top: var(--s5);
    }

    .bcc-pane {
      display: none;
    }

    #b02-component-comparison[data-component=&quot;page-header&quot;] .bcc-pane[data-pane=&quot;page-header&quot;],
    #b02-component-comparison[data-component=&quot;section-header&quot;] .bcc-pane[data-pane=&quot;section-header&quot;],
    #b02-component-comparison[data-component=&quot;inset&quot;] .bcc-pane[data-pane=&quot;inset&quot;],
    #b02-component-comparison[data-component=&quot;fact&quot;] .bcc-pane[data-pane=&quot;fact&quot;] {
      display: block;
    }

    .bcc-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--s4);
    }

    .bcc-option {
      min-width: 0;
    }

    .bcc-option-label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--s2);
      min-height: 30px;
      margin-bottom: var(--s2);
      color: var(--text-soft);
      font-size: 11px;
    }

    .bcc-option-label code {
      color: var(--text-muted);
      font-family: inherit;
      font-size: 9px;
    }

    .bcc-specimen {
      min-height: 230px;
    }

    .bcc-page-header {
      display: flex;
      min-height: 230px;
      flex-direction: column;
      justify-content: flex-end;
      padding: var(--s4);
      background: rgb(19 19 19 / 42%);
    }

    .bcc-page-title {
      margin: 0;
      color: var(--text-strong);
      font-family: &quot;Anton&quot;, sans-serif;
      font-size: 34px;
      font-weight: 400;
      letter-spacing: -.01em;
      line-height: 1;
      text-transform: uppercase;
    }

    .bcc-page-description {
      margin: var(--s2) 0 0;
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1.55;
    }

    .bcc-action {
      min-height: 34px;
      padding: 0 var(--s3);
      border: 1px solid rgb(67 242 200 / 40%);
      border-radius: 4px;
      background: var(--brand);
      color: #081510 !important;
      font-size: 11px;
      font-weight: 500;
    }

    .bcc-page-divider {
      border-bottom: 1px solid var(--border-structural);
    }

    .bcc-page-divider .bcc-page-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--s3);
      align-items: end;
    }

    .bcc-page-open {
      justify-content: center;
      padding-inline: 0;
      background: transparent;
    }

    .bcc-page-open .bcc-action {
      align-self: flex-start;
      margin-top: var(--s4);
    }

    .bcc-page-rail {
      display: grid;
      grid-template-columns: minmax(0, .9fr) minmax(120px, .7fr);
      gap: var(--s4);
      align-content: end;
      border-top: 1px solid var(--border-structural);
      border-bottom: 1px solid var(--border-structural);
      background: transparent;
    }

    .bcc-page-rail .bcc-page-side {
      padding-left: var(--s4);
      border-left: 1px solid var(--border-subtle);
    }

    .bcc-page-rail .bcc-action {
      margin-top: var(--s3);
    }

    .bcc-outline-context {
      min-height: 230px;
      padding: var(--s4);
      border: 1px solid var(--border-structural);
      border-radius: 10px;
      background: rgb(19 19 19 / 55%);
    }

    .bcc-outline-context::before {
      display: block;
      width: 54px;
      height: 2px;
      margin: calc(var(--s4) * -1 - 1px) 0 var(--s4);
      background: var(--brand);
      content: &quot;&quot;;
    }

    .bcc-section-header {
      display: flex;
      min-height: 76px;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--s3);
    }

    .bcc-section-header h2 {
      margin: 0;
      color: var(--text-strong);
      font-size: 17px;
      font-weight: 500;
    }

    .bcc-section-header p {
      margin: var(--s1) 0 0;
      color: var(--text-muted);
      font-size: 11px;
    }

    .bcc-meta {
      color: var(--text-soft);
      font-size: 10px;
    }

    .bcc-section-divider {
      padding-bottom: var(--s3);
      border-bottom: 1px solid var(--border-subtle);
    }

    .bcc-section-open {
      align-items: center;
      min-height: 76px;
    }

    .bcc-section-cutline {
      position: relative;
      padding-bottom: var(--s3);
    }

    .bcc-section-cutline::after {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 54px;
      height: 2px;
      background: var(--brand);
      content: &quot;&quot;;
    }

    .bcc-placeholder-lines {
      display: grid;
      gap: var(--s2);
      padding-top: var(--s4);
    }

    .bcc-placeholder-lines i {
      height: 9px;
      border-radius: 4px;
      background: rgb(255 255 255 / 5%);
    }

    .bcc-placeholder-lines i:nth-child(2) {
      width: 82%;

      width: 58%;

    .bcc-editor-shell {

      padding: var(--s4);
      border: 1px solid var(--border-structural);
      border-radius: 10px;
      background: rgb(19 19 19 / 55%);

    .bcc-editor-shell &gt; h2 {
      margin: 0 0 var(--s4);
      color: var(--text-strong);
      font-size: 16px;
      font-weight: 500;
    }

    .bcc-inset {
      min-height: 150px;
      padding: var(--s4);
      border-radius: 8px;
    }

    .bcc-preview {
      display: flex;
      align-items: center;
      gap: var(--s3);
    }

    .bcc-mark {
      display: grid;
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid rgb(67 242 200 / 20%);
      border-radius: 8px;
      background: var(--brand-soft);
      color: var(--brand);
      font-weight: 500;

    .bcc-preview strong,
    .bcc-preview span {
      display: block;
    }

    .bcc-preview strong {
      color: var(--text-strong);
      font-weight: 500;
    }

    .bcc-preview span {
      color: var(--text-muted);
      font-size: 11px;
    }

    .bcc-inset p {
      margin: var(--s3) 0 0;
      padding-top: var(--s3);
      border-top: 1px solid var(--border-subtle);
      color: var(--text-muted);
      font-size: 11px;
    }

    .bcc-inset-structural {
      border: 1px solid var(--border-subtle);
      background: var(--inset);
    }

    .bcc-inset-glass {
      border: 1px solid transparent;
      background:
        linear-gradient(135deg, rgb(255 255 255 / 6%), transparent 42%),
        rgb(15 15 15 / 68%);
      box-shadow:
        inset 0 1px 0 rgb(255 255 255 / 7%),
        inset 1px 0 0 rgb(255 255 255 / 2%);
      backdrop-filter: blur(12px);
    }

    .bcc-inset-well {
      background: var(--inset);
      box-shadow: inset 0 0 0 1px rgb(0 0 0 / 28%);
    }

    .bcc-summary-shell {
      display: grid;
      min-height: 230px;
      place-items: center;
      border: 1px solid transparent;
      border-radius: 12px;
      background:
        linear-gradient(135deg, rgb(255 255 255 / 7%), transparent 42%),
        rgb(24 24 24 / 58%);
      box-shadow:
        inset 0 1px 0 rgb(255 255 255 / 8%),
        inset 1px 0 0 rgb(255 255 255 / 3%);
      backdrop-filter: blur(16px);
    }

    .bcc-fact {
      display: inline-flex;
      align-items: center;
      gap: var(--s2);
      min-height: 34px;
      padding: 0 var(--s3);
      color: var(--text-soft);
      font-size: 10px;
    }

    .bcc-fact::before {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--brand);
      content: &quot;&quot;;
    }

    .bcc-fact-outline {
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      background: var(--inset);
    }

    .bcc-fact-glass {
      border: 1px solid transparent;
      border-radius: 4px;
      background: rgb(15 15 15 / 60%);
      box-shadow:
        inset 0 1px 0 rgb(255 255 255 / 8%),
        inset 1px 0 0 rgb(255 255 255 / 2%);
      backdrop-filter: blur(10px);
    }

    .bcc-fact-inline {
      padding-inline: 0;
      background: transparent;
    }

    .bcc-note {
      display: flex;
      gap: var(--s2);
      margin-top: var(--s5);
      padding-top: var(--s3);
      border-top: 1px solid var(--border-subtle);
      color: var(--text-muted);
      font-size: 11px;
    }

    .bcc-note::before {
      width: 14px;
      height: 2px;
      flex: 0 0 auto;
      margin-top: 7px;
      background: var(--brand);
      content: &quot;&quot;;
    }

    @media (max-width: 760px) {
      .bcc-toolbar {

        flex-direction: column;
      }

    @media (max-width: 560px) {
      .bcc-controls {

        width: 100%;

      }

      .bcc-page-rail {

      }

      .bcc-page-rail .bcc-page-side {
        padding: var(--s3) 0 0;
        border-top: 1px solid var(--border-subtle);
        border-left: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .bcc-control {
        transition: none;
      }
    }

    @supports not ((backdrop-filter: blur(1px))) {
      .bcc-inset-glass,
      .bcc-summary-shell,
      .bcc-fact-glass {
        background: #1b1b1b;
      }
    }

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&quot;b02-component-comparison&quot;);
      const notes = {
        &quot;page-header&quot;: &quot;Compare page hierarchy, action placement, and whether the bottom divider earns its visual weight.&quot;,
        &quot;section-header&quot;: &quot;Compare local association: the header must stay connected to its content without becoming another card.&quot;,
        &quot;inset&quot;: &quot;Compare nested depth: the inset must remain distinct inside Editorial Outline without creating heavy double chrome.&quot;,
        &quot;fact&quot;: &quot;Compare semantic weight: this is read-only metadata, so it must not resemble a button or a second card.&quot;
      };

      root.querySelectorAll(&quot;[data-component-value]&quot;).forEach((button) =&gt; {
        button.addEventListener(&quot;click&quot;, () =&gt; {
          const value = button.dataset.componentValue;
          root.dataset.component = value;
          root.querySelectorAll(&quot;[data-component-value]&quot;).forEach((peer) =&gt; {
            peer.setAttribute(&quot;aria-pressed&quot;, String(peer === button));

          root.querySelector(&quot;[data-decision-note]&quot;).textContent = notes[value];

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

(() =&gt; {

    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });

&lt;/script&gt;
