&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&quot;event-tier-family-lab&quot;);
  const tierNames = {
    S: &quot;Elite&quot;,
    A: &quot;Premier&quot;,
    B: &quot;Challenger&quot;,
    C: &quot;Open&quot;
  };

  const updateTier = (tier) =&gt; {
    root.dataset.tier = tier;
    root.querySelectorAll(&quot;.tier-letter&quot;).forEach((node) =&gt; {
      node.textContent = tier;
    });
    root.querySelectorAll(&quot;.tier-name&quot;).forEach((node) =&gt; {
      node.textContent = tierNames[tier];
    });
    root.querySelectorAll(&quot;.tier-mark&quot;).forEach((node) =&gt; {
      node.setAttribute(&quot;aria-label&quot;, `${tierNames[tier]} tier`);
    });
    root.querySelectorAll(&quot;.tier-control&quot;).forEach((button) =&gt; {
      button.setAttribute(&quot;aria-pressed&quot;, String(button.dataset.tierValue === tier));
    });
  };

  const updateListState = (state) =&gt; {
    root.dataset.listState = state;
    root.querySelectorAll(&quot;.state-control&quot;).forEach((button) =&gt; {
      button.setAttribute(&quot;aria-pressed&quot;, String(button.dataset.stateValue === state));
    });
  };

  root.querySelectorAll(&quot;.tier-control&quot;).forEach((button) =&gt; {
    button.addEventListener(&quot;click&quot;, () =&gt; updateTier(button.dataset.tierValue));
  });

  root.querySelectorAll(&quot;.state-control&quot;).forEach((button) =&gt; {
    button.addEventListener(&quot;click&quot;, () =&gt; updateListState(button.dataset.stateValue));
  });
})();
