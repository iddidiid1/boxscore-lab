  height: auto;
}

  width: 100%;
}

(() =&gt; {

  const updateContent = (state) =&gt; {
    root.querySelectorAll(&quot;.leader-card&quot;).forEach((card, index) =&gt; {
      card.querySelector(&quot;.leader-value&quot;).textContent = state === &quot;empty&quot; ? &quot;0.0&quot; : normalLeaders[index][0];
      card.querySelector(&quot;.leader-person strong&quot;).textContent = state === &quot;empty&quot; ? &quot;&quot; : normalLeaders[index][1];
      card.querySelector(&quot;.leader-person .text-muted&quot;).textContent = state === &quot;empty&quot; ? &quot;No eligible players&quot; : normalLeaders[index][2];
    });
    root.querySelector(&quot;.result-count&quot;).textContent = state === &quot;empty&quot; ? &quot;0 eligible players&quot; : &quot;42 eligible players&quot;;
  };

  root.querySelectorAll(&quot;.state-control&quot;).forEach((button) =&gt; {
    button.addEventListener(&quot;click&quot;, () =&gt; {
      root.dataset.state = button.dataset.stateValue;
      root.querySelectorAll(&quot;.state-control&quot;).forEach((control) =&gt; {
        control.setAttribute(&quot;aria-pressed&quot;, String(control === button));
      });
      updateContent(root.dataset.state);
    });
  });
})();
