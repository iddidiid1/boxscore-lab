  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;style&gt;
#event-editor-scenario { display: grid; gap: 12px; width: 100%; }
#event-editor-scenario &gt; .viz-controls { justify-content: end; }
#event-editor-scenario .editor-page { display: grid; gap: 16px; min-width: 0; padding-block: 6px; }
#event-editor-scenario .page-header,
#event-editor-scenario .section-header,
#event-editor-scenario .read-only-signal,
#event-editor-scenario .stage-editor &gt; div,
#event-editor-scenario .row-actions { display: flex; align-items: center; }
#event-editor-scenario .page-header { justify-content: space-between; gap: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
#event-editor-scenario .page-header &gt; div:first-child,
#event-editor-scenario .section-header &gt; div,
#event-editor-scenario .read-only-signal &gt; div { display: grid; gap: 3px; }
#event-editor-scenario .read-only-signal { position: relative; display: none; gap: 10px; padding: 12px 14px; background: color-mix(in srgb, var(--viz-series-2) 6%, transparent); }
#event-editor-scenario .read-only-signal &gt; span { position: absolute; inset: 0 auto 0 0; width: 2px; background: var(--viz-series-2); }
#event-editor-scenario .editor-section { display: grid; gap: 14px; padding-block: 15px; border-block: 1px solid var(--border); }
#event-editor-scenario .section-header { justify-content: space-between; gap: 14px; }
#event-editor-scenario .identity-grid { display: grid; grid-template-columns: minmax(0, .4fr) minmax(0, .6fr); gap: 12px; padding: 13px; background: color-mix(in srgb, var(--foreground) 2%, transparent); }
#event-editor-scenario .identity-grid .form-label { display: grid; gap: 6px; margin: 0; }
#event-editor-scenario .name-field,
#event-editor-scenario .description-field,
#event-editor-scenario .ranking-check { grid-column: 1 / -1; }
#event-editor-scenario .participant-options { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); border-block: 1px solid var(--border); }
#event-editor-scenario .participant-options .form-check { min-width: 0; min-height: 48px; padding: 9px; }
#event-editor-scenario .participant-options .form-check + .form-check { border-left: 1px solid var(--border); }
#event-editor-scenario .participant-options .form-check:nth-child(4n + 1) { border-left: 0; }
#event-editor-scenario .participant-options .form-check:nth-child(n + 5) { border-top: 1px solid var(--border); }
#event-editor-scenario .participant-options .form-check-label { min-width: 0; overflow-wrap: anywhere; }
#event-editor-scenario .participant-options small { display: block; color: var(--viz-series-2); }
#event-editor-scenario .stage-editor { display: grid; gap: 8px; }
#event-editor-scenario .stage-editor &gt; div { display: grid; grid-template-columns: minmax(150px, .7fr) minmax(220px, 1.3fr) auto; align-items: end; gap: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
#event-editor-scenario .stage-editor .form-label { display: grid; gap: 5px; margin: 0; }
#event-editor-scenario .result-editor-table { min-width: 660px; }
#event-editor-scenario .result-editor-table th:nth-child(1) { width: 36%; }
#event-editor-scenario .result-editor-table th:nth-child(2) { width: 86px; }
#event-editor-scenario .result-editor-table th:nth-child(3) { width: 130px; }
#event-editor-scenario .row-actions { justify-content: flex-end; gap: 3px; }
#event-editor-scenario .danger-action { color: var(--destructive); }
#event-editor-scenario .create-empty { display: none; padding-block: 8px; }
#event-editor-scenario[data-mode=&quot;create&quot;] .stage-editor,
#event-editor-scenario[data-mode=&quot;create&quot;] .results-section .table-responsive { display: none; }
#event-editor-scenario[data-mode=&quot;create&quot;] .create-empty { display: block; }

#event-editor-scenario[data-mode=&quot;archived&quot;] .save-action,

&lt;/style&gt;

&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&quot;event-editor-scenario&quot;);
  const title = root.querySelector(&quot;.page-title&quot;);
  const description = root.querySelector(&quot;.page-description&quot;);
  const saveAction = root.querySelector(&quot;.save-action&quot;);
  const statusField = root.querySelector(&#x27;input[value=&quot;PREPARING&quot;]&#x27;);
  const signalTitle = root.querySelector(&quot;.signal-title&quot;);
  const signalCopy = root.querySelector(&quot;.signal-copy&quot;);
  const lifecycleAction = root.querySelector(&quot;.lifecycle-action&quot;);
  const lifecycleCopy = root.querySelector(&quot;.lifecycle-copy&quot;);
  const nameField = root.querySelector(&quot;.name-field input&quot;);
  const descriptionField = root.querySelector(&quot;.description-field textarea&quot;);
  const participantFields = [...root.querySelectorAll(&#x27;.participant-options .editable-field[type=&quot;checkbox&quot;]&#x27;)];
  const participantCount = root.querySelector(&quot;.participant-count&quot;);

  const sync = () =&gt; {
    const mode = root.dataset.mode;
    const create = mode === &quot;create&quot;;
    const readOnly = mode === &quot;completed&quot; || mode === &quot;archived&quot;;
    title.textContent = create ? &quot;Create Event&quot; : &quot;Edit Event&quot;;
    description.textContent = create
      ? &quot;Create Event identity, participants, and reusable Match outcome tags.&quot;
      : &quot;Configure Event identity, participants, and reusable Match outcome tags.&quot;;
    saveAction.textContent = create ? &quot;Create Event&quot; : &quot;Save Changes&quot;;
    statusField.value = create || mode === &quot;preparing&quot; ? &quot;PREPARING&quot; : mode === &quot;ongoing&quot; ? &quot;ONGOING&quot; : &quot;COMPLETED&quot;;
    nameField.value = create ? &quot;&quot; : &quot;Metro Summer Cup&quot;;
    descriptionField.value = create ? &quot;&quot; : &quot;The league&#x27;s primary summer championship, bringing every active division into one final bracket.&quot;;
    participantFields.forEach((field, index) =&gt; {
      field.checked = create ? false : index &lt; 12;
    });
    participantCount.textContent = create ? &quot;0 selected&quot; : &quot;12 selected&quot;;
    root.querySelectorAll(&quot;.editable-field&quot;).forEach((field) =&gt; {
      field.disabled = readOnly || (create &amp;&amp; field.classList.contains(&quot;existing-unavailable&quot;));
    });
    root.querySelectorAll(&quot;.editable-action&quot;).forEach((action) =&gt; {
      action.disabled = readOnly || action.classList.contains(&quot;order-boundary&quot;);
    });
    if (mode === &quot;ongoing&quot;) {
      lifecycleAction.textContent = &quot;Complete Event&quot;;
      lifecycleCopy.textContent = &quot;Complete this Event after participant results are fully assigned.&quot;;
    } else if (mode === &quot;completed&quot;) {
      lifecycleAction.textContent = &quot;Reopen Event&quot;;
      lifecycleCopy.textContent = &quot;Reopen the Event to correct configuration, results, or awards.&quot;;
    } else {
      lifecycleAction.textContent = &quot;Start Event&quot;;
      lifecycleCopy.textContent = &quot;Start this Event after at least one eligible Team is selected.&quot;;
    }
    signalTitle.textContent = mode === &quot;archived&quot; ? &quot;Archived Event&quot; : &quot;Completed Event&quot;;
    signalCopy.textContent = mode === &quot;archived&quot;
      ? &quot;Historical configuration is permanently read-only.&quot;
      : &quot;Configuration is read-only. Reopen the Event to make corrections.&quot;;
  };

  root.querySelectorAll(&quot;.mode-control&quot;).forEach((button) =&gt; {
    button.addEventListener(&quot;click&quot;, () =&gt; {
      root.dataset.mode = button.dataset.modeValue;
      root.querySelectorAll(&quot;.mode-control&quot;).forEach((control) =&gt; {
        control.setAttribute(&quot;aria-pressed&quot;, String(control === button));
      });
      sync();
    });
  });
  sync();
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
