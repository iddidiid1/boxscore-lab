}

.form-switch .form-check-input:checked {

}

.form-switch .form-check-input:checked::before {

}

.form-switch .form-check-input:focus-visible {

.form-range {

  padding: 0;

.form-range::-webkit-slider-runnable-track {

.form-range:focus-visible::-webkit-slider-thumb {

}

.form-range::-moz-range-track {

}

.form-range::-moz-range-thumb {

}

.form-range:focus-visible::-moz-range-thumb {

}

.form-range:disabled {

svg {

&lt;body&gt;
&lt;div id=&quot;containment-context-lab&quot; data-context=&quot;data&quot; data-material=&quot;open&quot; data-eyebrow=&quot;off&quot;&gt;
  &lt;style&gt;
    @import url(&quot;https://fonts.googleapis.com/css2?family=Anton&amp;family=JetBrains+Mono:wght@400;500&amp;family=Space+Grotesk:wght@400;500&amp;display=swap&quot;);

    #containment-context-lab {
      --canvas: #131313;
      --panel: #1a1a1a;
      --inset: #0f0f0f;
      --raised: #232323;
      --text-strong: #ffffff;
      --text: #dedede;
      --text-soft: #b9b9b9;
      --text-muted: #949494;
      --brand: #43f2c8;
      --brand-soft: rgb(67 242 200 / 10%);
      --border-subtle: rgb(255 255 255 / 7.5%);
      --border-structural: rgb(255 255 255 / 13%);
      --focus: rgb(67 242 200 / 88%);
      --s1: 4px;
      --s2: 8px;
      --s3: 12px;
      --s4: 16px;
      --s5: 24px;
      --s6: 32px;
      --s7: 48px;
      position: relative;
      isolation: isolate;
      color: var(--text);
      background:
        radial-gradient(circle at 82% 58%, rgb(67 242 200 / 7%), transparent 30%),
        var(--canvas);
      font-family: &quot;Space Grotesk&quot;, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    #containment-context-lab::before {
      position: absolute;
      z-index: -1;
      inset: 0;
      opacity: .65;
      background-image:
        linear-gradient(rgb(255 255 255 / 2%) 1px, transparent 1px),
        linear-gradient(90deg, rgb(255 255 255 / 2%) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, transparent, black 30%, black 88%, transparent);
      content: &quot;&quot;;
    }

    #containment-context-lab * {
      box-sizing: border-box;
    }

    #containment-context-lab button,
    #containment-context-lab input,
    #containment-context-lab select {
      color: inherit;
      font: inherit;
    }

    #containment-context-lab button:focus-visible,
    #containment-context-lab input:focus-visible,
    #containment-context-lab select:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }

    .ccl-toolbar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: var(--s4);
      align-items: center;
      padding: var(--s3) 0 var(--s4);
      border-bottom: 1px solid var(--border-subtle);
    }

    .ccl-kicker,
    .ccl-label,
    .ccl-table-head,
    .ccl-number,
    .ccl-section-meta,
    .ccl-fact {
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-variant-numeric: tabular-nums;
    }

    .ccl-kicker,
    .ccl-label,
    .ccl-table-head {
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .ccl-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: var(--s2);
    }

    .ccl-control-group {
      display: inline-flex;
      gap: 2px;
      padding: 2px;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      background: rgb(26 26 26 / 82%);
      backdrop-filter: blur(10px);
    }

    .ccl-control {
      min-height: 32px;
      padding: 0 var(--s3);
      border: 0;
      border-radius: 3px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 10px;
    }

    .ccl-control:hover {
      background: var(--raised);
      color: var(--text-strong);
    }

    .ccl-control[aria-pressed=&quot;true&quot;] {
      background: var(--brand);
      color: #081510;
    }

    .ccl-page {
      padding: var(--s7) 0 var(--s6);
    }

    .ccl-page-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--s5);
      align-items: end;
      padding-bottom: var(--s6);
      border-bottom: 1px solid var(--border-structural);
    }

    .ccl-eyebrow {
      display: none;
      margin: 0 0 var(--s2);
      color: var(--brand);
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    #containment-context-lab[data-eyebrow=&quot;on&quot;] .ccl-eyebrow {
      display: block;
    }

    .ccl-title {
      margin: 0;
      color: var(--text-strong);
      font-family: &quot;Anton&quot;, sans-serif;
      font-size: clamp(40px, 7vw, 58px);
      font-weight: 400;
      letter-spacing: -.015em;
      line-height: .98;
      text-transform: uppercase;
    }

    .ccl-page-description {
      max-width: 58ch;
      margin: var(--s3) 0 0;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.6;
    }

    .ccl-page-action {
      min-height: 40px;
      padding: 0 var(--s4);
      border: 1px solid rgb(67 242 200 / 42%);
      border-radius: 4px;
      background: var(--brand);
      color: #081510 !important;
      font-weight: 500;
    }

    .ccl-context-line {
      display: flex;
      align-items: center;
      gap: var(--s2);
      min-height: 38px;
      margin: var(--s4) 0;
      color: var(--text-muted);
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 11px;
    }

    .ccl-context-line::before {
      width: 16px;
      height: 2px;
      background: var(--brand);
      content: &quot;&quot;;
    }

    .ccl-surface {
      position: relative;
      overflow: hidden;
      transition:
        background 180ms cubic-bezier(.2, .8, .2, 1),
        border-color 180ms cubic-bezier(.2, .8, .2, 1),
        border-radius 180ms cubic-bezier(.2, .8, .2, 1),
        padding 180ms cubic-bezier(.2, .8, .2, 1),
        box-shadow 180ms cubic-bezier(.2, .8, .2, 1);
    }

    #containment-context-lab[data-material=&quot;open&quot;] .ccl-surface {
      padding: 0;
      border-top: 1px solid var(--border-structural);
      border-bottom: 1px solid var(--border-structural);
      border-radius: 0;
      background: transparent;
    }

    #containment-context-lab[data-material=&quot;outline&quot;] .ccl-surface {
      padding: var(--s4);
      border: 1px solid var(--border-structural);
      border-radius: 10px;
      background: rgb(19 19 19 / 56%);
    }

    #containment-context-lab[data-material=&quot;outline&quot;] .ccl-surface::before {
      position: absolute;
      top: -1px;
      left: var(--s4);
      width: 64px;
      height: 2px;
      background: var(--brand);
      content: &quot;&quot;;
    }

    #containment-context-lab[data-material=&quot;glass&quot;] .ccl-surface {
      padding: var(--s4);
      border: 1px solid transparent;
      border-radius: 12px;
      background:
        linear-gradient(135deg, rgb(255 255 255 / 7%), transparent 42%),
        rgb(24 24 24 / 58%);
      box-shadow:
        inset 0 1px 0 rgb(255 255 255 / 8%),
        inset 1px 0 0 rgb(255 255 255 / 3%),
        0 14px 30px rgb(0 0 0 / 17%);
      backdrop-filter: blur(16px) saturate(115%);
    }

    .ccl-section-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--s4);
      align-items: end;
      padding: var(--s4) 0 var(--s3);
      border-bottom: 1px solid var(--border-subtle);
    }

    #containment-context-lab:not([data-material=&quot;open&quot;]) .ccl-section-header {
      padding-top: 0;
    }

    .ccl-section-title {
      margin: 0;
      color: var(--text-strong);
      font-size: 19px;
      font-weight: 500;
      letter-spacing: -.01em;
    }

    .ccl-section-description {
      margin: var(--s1) 0 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .ccl-section-meta {
      color: var(--text-soft);
      font-size: 11px;
    }

    .ccl-pane {
      display: none;
    }

    #containment-context-lab[data-context=&quot;data&quot;] .ccl-pane[data-context-pane=&quot;data&quot;],
    #containment-context-lab[data-context=&quot;editor&quot;] .ccl-pane[data-context-pane=&quot;editor&quot;],
    #containment-context-lab[data-context=&quot;summary&quot;] .ccl-pane[data-context-pane=&quot;summary&quot;] {
      display: block;
    }

    .ccl-table-head,
    .ccl-row {
      display: grid;
      grid-template-columns: 36px minmax(130px, 1.5fr) minmax(90px, .8fr) 64px 64px;
      gap: var(--s3);
      align-items: center;
      padding: var(--s2) 0;
    }

    .ccl-table-head {
      min-height: 34px;
    }

    .ccl-row {
      min-height: 54px;
      border-top: 1px solid var(--border-subtle);
    }

    .ccl-rank {
      color: var(--text-muted);
      font-family: &quot;JetBrains Mono&quot;, monospace;
    }

    .ccl-name {
      min-width: 0;
    }

    .ccl-name strong,
    .ccl-name span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ccl-name strong {
      color: var(--text-strong);
      font-weight: 500;
    }

    .ccl-name span {
      color: var(--text-muted);
      font-size: 11px;
    }

    .ccl-number {

    .ccl-editor-grid {

      gap: var(--s4);
      padding-top: var(--s4);

      gap: var(--s3);
    }

    .ccl-field {

      background: var(--inset);

    .ccl-preview {

      align-items: center;
      gap: var(--s3);
    }

    .ccl-mark {

    .ccl-preview strong,
    .ccl-preview span {
      display: block;
    }

    .ccl-preview strong {
      color: var(--text-strong);
      font-weight: 500;
    }

    .ccl-preview span {
      color: var(--text-muted);
      font-size: 11px;

      font-size: 11px;
    }

    .ccl-summary {

    }

    .ccl-stat {

    .ccl-stat + .ccl-stat {
      border-left: 1px solid var(--border-subtle);
    }

    .ccl-stat strong,
    .ccl-stat span {
      display: block;
    }

    .ccl-stat strong {
      color: var(--text-strong);
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 24px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .ccl-stat:first-child strong {
      color: var(--brand);

    .ccl-stat span {
      margin-top: var(--s1);
      color: var(--text-muted);
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 10px;
      text-transform: uppercase;
    }

    .ccl-fact {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 30px;
      padding: 0 var(--s3);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      background: var(--inset);
      color: var(--text-soft);
      font-size: 10px;
    }

    .ccl-fact::before {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
      content: &quot;&quot;;
    }

    .ccl-rule-line {
      display: flex;
      flex-wrap: wrap;

      margin-top: var(--s5);
      padding-top: var(--s3);
      border-top: 1px solid var(--border-subtle);
      color: var(--text-muted);
      font-size: 11px;
    }

    .ccl-rule-line strong {

    @media (max-width: 760px) {

      .ccl-page-header {

      .ccl-controls {

      .ccl-page-action {

      .ccl-editor-grid {

    @media (max-width: 560px) {
      .ccl-control-group {
        display: flex;
        width: 100%;
      }

      .ccl-control {
        flex: 1;
        padding-inline: var(--s2);
      }

      .ccl-page {
        padding-top: var(--s6);
      }

      .ccl-section-header {
        grid-template-columns: 1fr;
      }

      .ccl-table-head,
      .ccl-row {
        grid-template-columns: 30px minmax(104px, 1fr) 58px 58px;
      }

      .ccl-table-head &gt; :nth-child(3),
      .ccl-row &gt; :nth-child(3) {
        display: none;
      }

      .ccl-summary {
        grid-template-columns: repeat(2, 1fr);
      }

      .ccl-stat:nth-child(3) {
        border-left: 0;
        border-top: 1px solid var(--border-subtle);
      }

      .ccl-stat:nth-child(4) {
        border-top: 1px solid var(--border-subtle);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .ccl-surface {
        transition: none;
      }
    }

        background:
          linear-gradient(135deg, rgb(255 255 255 / 6%), transparent 42%),
          #1b1b1b;
      }
    }

          pageAction: &quot;Create event&quot;,

          sectionTitle: &quot;League snapshot&quot;,

      const materials = {
        open: &quot;Open Section&quot;,
        outline: &quot;Editorial Outline&quot;,
        glass: &quot;Dark Glass · Edge Highlight&quot;

      function updateContext(value) {
        const next = contexts[value];
        root.querySelector(&quot;[data-page-eyebrow]&quot;).textContent = next.pageEyebrow;
        root.querySelector(&quot;[data-page-title]&quot;).textContent = next.pageTitle;
        root.querySelector(&quot;[data-page-description]&quot;).textContent = next.pageDescription;
        root.querySelector(&quot;[data-page-action]&quot;).textContent = next.pageAction;
        root.querySelector(&quot;[data-context-label]&quot;).textContent = next.contextLabel;
        root.querySelector(&quot;[data-section-title]&quot;).textContent = next.sectionTitle;
        root.querySelector(&quot;[data-section-description]&quot;).textContent = next.sectionDescription;

      root.querySelectorAll(&quot;[data-set]&quot;).forEach((button) =&gt; {

          if (property === &quot;context&quot;) updateContext(value);

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
