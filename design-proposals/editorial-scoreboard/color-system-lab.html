:root[data-theme=&quot;dark&quot;] {

* {
  box-sizing: border-box;

html &gt; body {
  margin: 0;
  padding: 5px;
  color: var(--foreground);
  background: transparent !important;
  font-family: var(--font-sans);
  font-size: var(--font-size-normal);
  font-weight: var(--font-weight-normal);
  line-height: var(--line-height-normal);

a {
  color: color-mix(in srgb, var(--viz-accent) 80%, var(--viz-text) 20%);

  font-weight: var(--viz-font-weight-medium);
  text-decoration: none;
  text-underline-offset: 2px;
}

a:is(:hover, :focus-visible) {
  text-decoration-line: underline;
  text-decoration-style: dashed;
  text-decoration-thickness: 0.5px;
}

h1,
h2,
h3,
h4,
h5,
h6,
p {
  margin-block: 0;

h1 {
  font-size: var(--font-size-h1);
  font-weight: var(--font-weight-medium);

h2 {

  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

h3,
h4,
h5,
h6 {
  font-size: var(--font-size-h3);
  font-weight: var(--font-weight-medium);
  line-height: 1.3;
}

b,
strong,
th {
  font-weight: var(--font-weight-medium);
}

code:not(pre code) {
  display: inline;
  padding: 1px 6px;
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background: var(--muted);
  font-family: var(--font-mono);
  font-size: 0.92em;
  overflow-wrap: anywhere;
  -webkit-box-decoration-break: clone;
  box-decoration-break: clone;
  word-break: break-word;
}

.table-responsive {
  width: 100%;
  overflow-x: auto;
  scrollbar-width: thin;
}

.table {

  border-collapse: collapse;
  color: var(--foreground);
  font: inherit;
  text-align: start;
}

.table :is(th, td) {

  padding-inline: 0 24px;
  overflow-wrap: anywhere;
  border-bottom: 1px solid var(--border);
  text-align: start;
  vertical-align: top;
}

.table-responsive &gt; .table :is(th, td) {
  overflow-wrap: break-word;
}

.table :is(th, td):last-child {
  padding-inline-end: 0;
}

.table :is(caption, thead th) {

}

.table thead th {
  padding-block: 8px;
  border-bottom-color: color-mix(in srgb, var(--foreground) 16%, transparent);
}

.table tbody tr:last-child :is(th, td) {
  border-bottom: 0;
}

.table.table-sm :is(th, td) {
  padding-block: 6px;
}

.table.table-sm :is(th, td):not(:last-child) {

}

.table :is(.text-end, [align=&quot;right&quot;]) {

  font-variant-numeric: tabular-nums;
}

.table :is(.text-center, [align=&quot;center&quot;]) {

}

.table .text-nowrap {
  white-space: nowrap;
}

#widget {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  padding: 0;
  background: transparent !important;
}

.card {
  min-width: 0;
  padding: 12px;
  overflow: hidden;
  overflow-wrap: break-word;
  border-radius: var(--radius-2xl);
  corner-shape: superellipse(1.5);
  color: var(--card-foreground);
  background: var(--card);
}

#widget &gt; :not(.card) {
  width: 100% !important;
  max-width: none !important;
  margin: 0 !important;
  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;
  box-shadow: none !important;
}

.tooltip {
  position: fixed;
  z-index: 50;
  top: 0;
  left: 0;
  width: max-content;
  max-width: min(
    20rem,
    var(--tooltip-available-width, calc(100vw - 10px)),
    calc(100vw - 10px)
  );
  max-height: min(
    var(--tooltip-available-height, calc(100vh - 10px)),
    calc(100vh - 10px)
  );
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--popover-foreground);
  background: var(--popover);
  box-shadow: none;
  font-size: var(--font-size-tooltip);
  line-height: var(--line-height-tooltip);
  overflow-wrap: break-word;
  white-space: normal;
  pointer-events: none;
  user-select: none;
}

.viz-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(max(180px, 24%), 1fr));
  gap: 10px;
}

.viz-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.viz-stat-value {
  font-size: var(--font-size-h2);
  font-weight: var(--font-weight-medium);
  line-height: 1.25;
}

.viz-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}

.viz-badge {
  padding: 3px 8px;
  border-radius: var(--radius-full);
  color: var(--accent-foreground);
  background: var(--accent);
  font-weight: var(--font-weight-medium);
}

small,
.text-small,
.viz-badge {
  font-size: var(--font-size-small);
  line-height: var(--line-height-small);
}

.text-muted {
  color: var(--muted-foreground);
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.viz-controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

.viz-controls &gt; .form-label {
  display: grid;
  min-width: min(100%, 260px);
  flex: 1 1 280px;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: baseline;
  gap: 2px 12px;
  margin-bottom: 0;
}

.viz-controls &gt; .form-label &gt; :is(.form-control, .form-range, .form-select) {
  grid-column: 1 / -1;
}

.btn,
.form-check-input,

  font: inherit;
}

.btn {
  appearance: button;
  display: inline-flex;
  inline-size: fit-content;
  max-inline-size: 100%;
  min-height: 28px;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin: 0;
  padding: 0 8px;
  -webkit-app-region: no-drag;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--secondary-foreground);
  background: var(--secondary);
  cursor: var(--cursor-interaction, pointer);
  text-align: center;
  text-decoration: none;
  white-space: nowrap;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

}

  min-width: 0;
  overflow-wrap: anywhere;
  white-space: normal;
}

  text-decoration: none;
}

.btn:not(:disabled):hover {

  background: var(--foreground);

.btn-primary:not(:disabled):hover {

}

  color: var(--muted-foreground);
  background: transparent;
}

.btn-ghost:not(:disabled):hover {
  color: var(--foreground);
  background: color-mix(in srgb, var(--foreground) 6%, var(--secondary));
}

.btn:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

[data-lucide] {
  stroke-width: 1.6;
}

.form-label {
  display: block;
  margin-bottom: 6px;
  color: var(--foreground);
}

.form-control {
  display: block;
  width: 100%;
  min-height: 28px;
  padding: 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background: var(--secondary);

  min-height: 26px;
  margin-right: 8px;
  padding: 0 8px;

  background: var(--secondary);
  cursor: inherit;
  font: inherit;

  height: 28px;
  padding: 3px;
  cursor: var(--cursor-interaction, pointer);

  min-height: 72px;
  padding: 8px 10px;
  resize: vertical;
}

.form-control:focus-visible {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-control:disabled,
.form-select:disabled {
  cursor: not-allowed;
  opacity: 0.4;

.form-select {
  appearance: none;
  display: block;
  width: 100%;
  min-height: 28px;
  margin: 0;
  padding: 0 32px 0 8px;
  outline: none;
  border: 1px solid var(--input);
  border-radius: var(--radius-lg);
  corner-shape: superellipse(1.5);
  color: var(--foreground);
  background-color: var(--secondary);
  background-image:

.form-select:focus-visible {

  height: 14px;

  margin: 0;
  border: 1px solid var(--input);
  color: var(--primary-foreground);
  background-color: transparent;
  cursor: var(--cursor-interaction, default);
  transition:
    background-color 150ms,
    border-color 150ms,
    box-shadow 150ms;

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;] {
  border-color: var(--input);
  border-radius: var(--radius-sm);
  corner-shape: superellipse(1.5);
  background-color: var(--secondary);
  box-shadow: var(--shadow-sm);

}

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;]:checked {

  top: 50%;

  height: 16px;

  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

      --lab-ink-on-mint: #07110e;

      --lab-border-strong: color-mix(in srgb, var(--lab-text) 14%, transparent);
      --lab-inset: color-mix(in srgb, var(--lab-canvas) 80%, #000000);

      color: var(--muted-foreground);

      padding-right: var(--spacing-sm);
      border-right: 1px solid var(--border);

      --muted-foreground: var(--lab-muted);

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&quot;bsl-color-system-lab&quot;);
      if (!root) return;

      const presets = {
        &quot;selected-hybrid&quot;: {
          canvas: &quot;#131313&quot;,
          surface: &quot;#1a1a1a&quot;,
          raised: &quot;#232323&quot;,
          text: &quot;#ffffff&quot;,
          muted: &quot;#949494&quot;,
          mint: &quot;#43f2c8&quot;
        },
        &quot;soft-graphite&quot;: {
          canvas: &quot;#111312&quot;,
          surface: &quot;#171918&quot;,
          raised: &quot;#1b201e&quot;,
          text: &quot;#f1f3f2&quot;,
          muted: &quot;#858d88&quot;,
          mint: &quot;#3cffd0&quot;
        },
        &quot;current-baseline&quot;: {
          canvas: &quot;#131313&quot;,
          surface: &quot;#1a1a1a&quot;,
          raised: &quot;#232323&quot;,
          text: &quot;#ffffff&quot;,
          muted: &quot;#949494&quot;,
          mint: &quot;#3cffd0&quot;
        },
        &quot;deep-green&quot;: {
          canvas: &quot;#0d1210&quot;,
          surface: &quot;#131a17&quot;,
          raised: &quot;#19231f&quot;,
          text: &quot;#edf5f1&quot;,
          muted: &quot;#82958c&quot;,
          mint: &quot;#43f2c8&quot;
        },
        &quot;light-reference&quot;: {
          canvas: &quot;#f3f4f0&quot;,
          surface: &quot;#ffffff&quot;,
          raised: &quot;#e8ebe6&quot;,
          text: &quot;#121513&quot;,
          muted: &quot;#626b66&quot;,
          mint: &quot;#25d9ad&quot;
        }
      };

      const presetSelect = root.querySelector(&#x27;[data-control=&quot;preset&quot;]&#x27;);
      const colorInputs = [...root.querySelectorAll(&quot;[data-color]&quot;)];
      const tokenLine = root.querySelector(&quot;[data-token-line]&quot;);

      const hexToRgb = (hex) =&gt; {
        const value = hex.replace(&quot;#&quot;, &quot;&quot;);
        return {
          r: parseInt(value.slice(0, 2), 16),
          g: parseInt(value.slice(2, 4), 16),
          b: parseInt(value.slice(4, 6), 16)
        };
      };

      const relativeLuminance = (hex) =&gt; {
        const rgb = hexToRgb(hex);
        const channels = [rgb.r, rgb.g, rgb.b].map((value) =&gt; {
          const normalized = value / 255;
          return normalized &lt;= 0.04045
            ? normalized / 12.92
            : Math.pow((normalized + 0.055) / 1.055, 2.4);
        });
        return 0.2126 * channels[0] + 0.7152 * channels[1] + 0.0722 * channels[2];
      };

      const contrast = (first, second) =&gt; {
        const a = relativeLuminance(first);
        const b = relativeLuminance(second);
        return ((Math.max(a, b) + 0.05) / (Math.min(a, b) + 0.05)).toFixed(1) + &quot;:1&quot;;
      };

      const readableInk = (background) =&gt;
        relativeLuminance(background) &gt; 0.45 ? &quot;#07110e&quot; : &quot;#f4fffb&quot;;

      const applyColors = (colors, updateInputs = true) =&gt; {
        Object.entries(colors).forEach(([name, value]) =&gt; {
          root.style.setProperty(`--lab-${name}`, value);
          if (updateInputs) {
            const input = root.querySelector(`[data-color=&quot;${name}&quot;]`);
            if (input) input.value = value;
          }
        });

        const mintRgb = hexToRgb(colors.mint);
        root.style.setProperty(&quot;--lab-mint-rgb&quot;, `${mintRgb.r}, ${mintRgb.g}, ${mintRgb.b}`);
        root.style.setProperty(&quot;--lab-ink-on-mint&quot;, readableInk(colors.mint));

        root.querySelector(&#x27;[data-ratio=&quot;text&quot;]&#x27;).textContent = contrast(colors.text, colors.canvas);
        root.querySelector(&#x27;[data-ratio=&quot;muted&quot;]&#x27;).textContent = contrast(colors.muted, colors.canvas);
        root.querySelector(&#x27;[data-ratio=&quot;mint&quot;]&#x27;).textContent = contrast(colors.mint, colors.canvas);
        root.querySelector(&#x27;[data-ratio=&quot;surface&quot;]&#x27;).textContent = contrast(colors.surface, colors.canvas);
        root.querySelector(&#x27;[data-ratio=&quot;raised&quot;]&#x27;).textContent = contrast(colors.raised, colors.surface);
        tokenLine.textContent = Object.entries(colors).map(([name, value]) =&gt; `${name} ${value}`).join(&quot; · &quot;);
      };

      const currentColors = () =&gt;
        Object.fromEntries(colorInputs.map((input) =&gt; [input.dataset.color, input.value]));

      presetSelect.addEventListener(&quot;change&quot;, () =&gt; {
        applyColors(presets[presetSelect.value]);
      });

      colorInputs.forEach((input) =&gt; {
        input.addEventListener(&quot;input&quot;, () =&gt; {
          presetSelect.value = &quot;custom&quot;;
          applyColors(currentColors(), false);
        });
      });

      root.querySelectorAll(&quot;.bsl-nav-item&quot;).forEach((button) =&gt; {
        button.addEventListener(&quot;click&quot;, () =&gt; {
          root.querySelectorAll(&quot;.bsl-nav-item&quot;).forEach((item) =&gt; {
            const selected = item === button;
            item.classList.toggle(&quot;is-selected&quot;, selected);
            item.setAttribute(&quot;aria-pressed&quot;, String(selected));
          });
        });
      });

      applyColors(presets[&quot;selected-hybrid&quot;]);
    })();
