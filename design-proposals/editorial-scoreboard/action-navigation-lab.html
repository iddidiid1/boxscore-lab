.card {

  corner-shape: superellipse(1.5);
  color: var(--card-foreground);
  background: var(--card);

  padding: 0 !important;
  border: 0 !important;
  border-radius: 0 !important;
  background: transparent !important;

.tooltip {

  top: 0;
  left: 0;
  width: max-content;

  background: var(--popover);

.viz-stat-value {

  align-items: center;
  gap: 10px;

.text-muted {

}

.sr-only {

  width: 1px;
  height: 1px;
  padding: 0;

  clip: rect(0, 0, 0, 0);

.viz-controls {

  align-items: center;

.btn {

  min-height: 28px;
  align-items: center;

  border: 1px solid var(--input);
  border-radius: var(--radius-lg);

.form-control:focus-visible {

  border-radius: var(--radius-lg);

  color: var(--primary-foreground);

    border-color 150ms,

  background-color: var(--secondary);

  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;body&gt;
&lt;div id=&quot;action-navigation-lab&quot; data-view=&quot;actions&quot; data-state=&quot;default&quot;&gt;
  &lt;style&gt;
    @import url(&quot;https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;family=Space+Grotesk:wght@400;500&amp;display=swap&quot;);

    #action-navigation-lab {
      --canvas: #131313;
      --panel: #1a1a1a;
      --raised: #232323;
      --inset: #0f0f0f;
      --text-strong: #ffffff;
      --text: #dedede;
      --text-soft: #b9b9b9;
      --text-muted: #949494;
      --text-disabled: #666666;
      --brand: #43f2c8;
      --brand-hover: #69f5d3;
      --brand-soft: rgb(67 242 200 / 11%);
      --danger: #ff786d;
      --danger-soft: rgb(255 120 109 / 11%);
      --warning: #f4c96b;
      --info: #79b8ff;
      --border-subtle: rgb(255 255 255 / 7.5%);
      --border-structural: rgb(255 255 255 / 13%);
      --border-hover: rgb(255 255 255 / 19%);
      --focus: rgb(67 242 200 / 88%);
      --s1: 4px;
      --s2: 8px;
      --s3: 12px;
      --s4: 16px;
      --s5: 24px;
      --s6: 32px;
      position: relative;
      color: var(--text);
      background:
        radial-gradient(circle at 82% 62%, rgb(67 242 200 / 5%), transparent 30%),
        var(--canvas);
      font-family: &quot;Space Grotesk&quot;, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    #action-navigation-lab * {
      box-sizing: border-box;
    }

    #action-navigation-lab button,
    #action-navigation-lab a {
      color: inherit;
      font: inherit;
    }

    #action-navigation-lab button:focus-visible,
    #action-navigation-lab a:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }

    .anl-toolbar {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: var(--s4);
      align-items: center;
      padding: var(--s3) 0 var(--s4);
      border-bottom: 1px solid var(--border-subtle);
    }

    .anl-kicker,
    .anl-group-label,
    .anl-note,
    .anl-health,
    .anl-size {
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-variant-numeric: tabular-nums;
    }

    .anl-kicker,
    .anl-group-label {
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .anl-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: var(--s2);
    }

    .anl-control-group {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 2px;
      padding: 2px;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      background: var(--panel);
    }

    .anl-control {
      min-height: 32px;
      padding: 0 var(--s3);
      border: 0;
      border-radius: 3px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 10px;
    }

    .anl-control:hover {
      background: var(--raised);
      color: var(--text-strong);
    }

    .anl-control[aria-pressed=&quot;true&quot;] {
      background: var(--brand);
      color: #081510;
    }

    .anl-stage {
      padding: var(--s5) 0;
    }

    .anl-pane {
      display: none;
    }

    #action-navigation-lab[data-view=&quot;actions&quot;] .anl-pane[data-pane=&quot;actions&quot;],
    #action-navigation-lab[data-view=&quot;navigation&quot;] .anl-pane[data-pane=&quot;navigation&quot;],
    #action-navigation-lab[data-view=&quot;health&quot;] .anl-pane[data-pane=&quot;health&quot;] {
      display: block;
    }

    .anl-action-group + .anl-action-group {
      margin-top: var(--s5);
      padding-top: var(--s5);
      border-top: 1px solid var(--border-subtle);
    }

    .anl-group-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--s3);
      margin-bottom: var(--s3);
    }

    .anl-size {
      color: var(--text-muted);
      font-size: 10px;
    }

    .anl-action-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--s3);
      align-items: center;
    }

    .anl-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--s2);
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      white-space: nowrap;
      transition:
        color 160ms cubic-bezier(.2, .8, .2, 1),
        background 160ms cubic-bezier(.2, .8, .2, 1),
        border-color 160ms cubic-bezier(.2, .8, .2, 1),
        box-shadow 160ms cubic-bezier(.2, .8, .2, 1),
        transform 100ms cubic-bezier(.2, .8, .2, 1);
    }

    .anl-large {
      min-height: 42px;
      padding: 0 var(--s4);
      font-size: 14px;
    }

    .anl-medium {
      min-height: 36px;
      padding: 0 var(--s3);
      font-size: 13px;
    }

    .anl-small {
      min-height: 32px;
      padding: 0 var(--s3);
      font-size: 12px;
    }

    .anl-icon-button {
      width: 32px;
      min-width: 32px;
      height: 32px;
      padding: 0;
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 14px;
    }

    .anl-primary {
      border: 1px solid rgb(67 242 200 / 42%);
      background: var(--brand);
      color: #081510 !important;
    }

    .anl-return {
      border: 1px solid var(--border-structural);
      background: transparent;
      color: var(--text-soft) !important;
    }

    .anl-danger {
      border: 1px solid rgb(255 120 109 / 30%);
      background: transparent;
      color: var(--danger) !important;
    }

    .anl-related {
      position: relative;
      border: 1px solid transparent;
      background:
        linear-gradient(135deg, rgb(255 255 255 / 6%), transparent 45%),
        rgb(24 24 24 / 58%);
      box-shadow:
        inset 0 1px 0 rgb(255 255 255 / 8%),
        inset 1px 0 0 rgb(255 255 255 / 3%);
      color: var(--text-strong) !important;
      backdrop-filter: blur(12px);
    }

    .anl-related::after {
      width: 14px;
      height: 2px;
      margin-left: var(--s1);
      background: var(--brand);
      content: &quot;&quot;;
    }

    .anl-context {
      border: 1px solid rgb(67 242 200 / 22%);
      background: var(--brand-soft);
      color: var(--brand) !important;
    }

    .anl-secondary {
      border: 1px solid var(--border-subtle);
      background: var(--raised);
      color: var(--text-soft) !important;
    }

    .anl-small-danger {
      border: 1px solid transparent;
      background: transparent;
      color: var(--danger) !important;
    }

    .anl-icon-quiet {
      border: 1px solid var(--border-subtle);
      background: var(--inset);
      color: var(--text-soft) !important;
    }

    .anl-icon-danger {
      border: 1px solid rgb(255 120 109 / 18%);
      background: var(--danger-soft);
      color: var(--danger) !important;
    }

    .anl-spinner {
      display: none;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: anl-spin 700ms linear infinite;
    }

    @keyframes anl-spin {
      to { transform: rotate(360deg); }
    }

    #action-navigation-lab[data-state=&quot;hover&quot;] .anl-primary {
      background: var(--brand-hover);
    }

    #action-navigation-lab[data-state=&quot;hover&quot;] .anl-return,
    #action-navigation-lab[data-state=&quot;hover&quot;] .anl-secondary,
    #action-navigation-lab[data-state=&quot;hover&quot;] .anl-icon-quiet {
      border-color: var(--border-hover);
      background: rgb(255 255 255 / 7%);
      color: var(--text-strong) !important;
    }

    #action-navigation-lab[data-state=&quot;hover&quot;] .anl-danger,
    #action-navigation-lab[data-state=&quot;hover&quot;] .anl-small-danger,
    #action-navigation-lab[data-state=&quot;hover&quot;] .anl-icon-danger {
      border-color: rgb(255 120 109 / 38%);
      background: var(--danger-soft);
    }

    #action-navigation-lab[data-state=&quot;hover&quot;] .anl-related {
      background:
        linear-gradient(135deg, rgb(67 242 200 / 8%), transparent 42%),
        rgb(29 29 29 / 64%);
      box-shadow:
        inset 0 1px 0 rgb(67 242 200 / 17%),
        inset 1px 0 0 rgb(255 255 255 / 3%);
    }

    #action-navigation-lab[data-state=&quot;hover&quot;] .anl-context {
      border-color: rgb(67 242 200 / 38%);
      background: rgb(67 242 200 / 16%);
    }

    #action-navigation-lab[data-state=&quot;focus&quot;] .anl-demo {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }

    #action-navigation-lab[data-state=&quot;pressed&quot;] .anl-demo {
      transform: translateY(1px);
      box-shadow: inset 0 2px 8px rgb(0 0 0 / 30%);
    }

    #action-navigation-lab[data-state=&quot;pressed&quot;] .anl-primary {
      background: #34dcb5;
    }

    #action-navigation-lab[data-state=&quot;pressed&quot;] .anl-related::after {
      width: 20px;
    }

    #action-navigation-lab[data-state=&quot;selected&quot;] .anl-demo {
      border-color: rgb(67 242 200 / 34%);
      background: var(--brand-soft);
      color: var(--brand) !important;
      box-shadow: inset 0 1px 0 rgb(67 242 200 / 13%);
    }

    #action-navigation-lab[data-state=&quot;selected&quot;] .anl-primary {
      background: var(--brand);
      color: #081510 !important;
    }

    #action-navigation-lab[data-state=&quot;selected&quot;] .anl-danger,
    #action-navigation-lab[data-state=&quot;selected&quot;] .anl-small-danger,
    #action-navigation-lab[data-state=&quot;selected&quot;] .anl-icon-danger {
      border-color: rgb(255 120 109 / 38%);
      background: var(--danger-soft);
      color: var(--danger) !important;
    }

    #action-navigation-lab[data-state=&quot;disabled&quot;] .anl-demo {
      opacity: .38;
      cursor: not-allowed;
      filter: saturate(.35);
    }

    #action-navigation-lab[data-state=&quot;loading&quot;] .anl-button .anl-spinner {
      display: inline-block;
    }

    #action-navigation-lab[data-state=&quot;loading&quot;] .anl-button {
      cursor: progress;
    }

    #action-navigation-lab[data-state=&quot;loading&quot;] .anl-icon-button .anl-icon-glyph {
      display: none;
    }

    .anl-navigation-grid {
      display: grid;
      grid-template-columns: minmax(210px, .62fr) minmax(0, 1.38fr);
      gap: var(--s5);
      align-items: start;
    }

    .anl-sidebar {
      padding: var(--s4);
      border-right: 1px solid var(--border-subtle);
      background: var(--inset);
    }

    .anl-brand {
      padding-bottom: var(--s4);
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-strong);
      font-weight: 500;
    }

    .anl-brand span {
      color: var(--brand);
    }

    .anl-nav-list {
      display: grid;
      gap: var(--s1);
      margin-top: var(--s4);
    }

    .anl-nav-item {
      display: flex;
      min-height: 38px;
      align-items: center;
      gap: var(--s3);
      padding: 0 var(--s3);
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text-muted);
      text-decoration: none;
    }

    .anl-nav-icon {
      width: 16px;
      color: var(--text-soft);
      font-family: &quot;JetBrains Mono&quot;, monospace;
      text-align: center;
    }

    #action-navigation-lab[data-state=&quot;hover&quot;] .anl-nav-target {
      background: var(--raised);
      color: var(--text-strong);
    }

    #action-navigation-lab[data-state=&quot;focus&quot;] .anl-nav-target,
    #action-navigation-lab[data-state=&quot;focus&quot;] .anl-link-target {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }

    #action-navigation-lab[data-state=&quot;pressed&quot;] .anl-nav-target {
      background: rgb(67 242 200 / 8%);
      transform: translateY(1px);
    }

    #action-navigation-lab[data-state=&quot;selected&quot;] .anl-nav-target {
      border-color: rgb(67 242 200 / 18%);
      background: var(--brand-soft);
      color: var(--text-strong);
    }

    #action-navigation-lab[data-state=&quot;selected&quot;] .anl-nav-target .anl-nav-icon {
      color: var(--brand);
    }

    #action-navigation-lab[data-state=&quot;disabled&quot;] .anl-nav-target,
    #action-navigation-lab[data-state=&quot;disabled&quot;] .anl-link-target {
      opacity: .38;
      cursor: not-allowed;
    }

    #action-navigation-lab[data-state=&quot;loading&quot;] .anl-nav-target::after {
      width: 10px;
      height: 10px;
      margin-left: auto;
      border: 2px solid var(--text-muted);
      border-right-color: transparent;
      border-radius: 50%;
      animation: anl-spin 700ms linear infinite;
      content: &quot;&quot;;
    }

    .anl-link-area {
      display: grid;
      gap: var(--s5);
      padding-top: var(--s2);
    }

    .anl-link-specimen {
      padding-bottom: var(--s4);
      border-bottom: 1px solid var(--border-subtle);
    }

    .anl-link-specimen h2 {
      margin: 0 0 var(--s3);
      color: var(--text-strong);
      font-size: 17px;
      font-weight: 500;
    }

    .anl-back-link,
    .anl-inline-link {
      display: inline-flex;
      align-items: center;
      gap: var(--s2);
      border-radius: 2px;
      color: var(--text-soft);
      text-underline-offset: 3px;
    }

    .anl-back-link {
      font-weight: 500;
      text-decoration: none;
    }

    .anl-back-link::before {
      color: var(--brand);
      content: &quot;←&quot;;
    }

    .anl-inline-link {
      color: var(--brand);
      text-decoration-line: underline;
      text-decoration-color: rgb(67 242 200 / 42%);
    }

    #action-navigation-lab[data-state=&quot;hover&quot;] .anl-back-link,
    #action-navigation-lab[data-state=&quot;hover&quot;] .anl-inline-link {
      color: var(--text-strong);
    }

    #action-navigation-lab[data-state=&quot;hover&quot;] .anl-inline-link {
      text-decoration-color: var(--brand);
    }

    #action-navigation-lab[data-state=&quot;pressed&quot;] .anl-link-target {
      color: var(--brand);
      transform: translateY(1px);
    }

    #action-navigation-lab[data-state=&quot;selected&quot;] .anl-link-target {
      background: var(--brand-soft);
      color: var(--brand);
    }

    .anl-health-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--s4);
    }

    .anl-health-shell {
      min-height: 150px;
      padding: var(--s4);
      border-left: 1px solid var(--border-subtle);
      background: var(--inset);
    }

    .anl-health-label {
      color: var(--text-muted);
      font-size: 11px;
    }

    .anl-health {
      display: flex;
      align-items: center;
      gap: var(--s2);
      margin-top: var(--s5);
      color: var(--text-soft);
      font-size: 11px;
      text-transform: uppercase;
    }

    .anl-health::before {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      content: &quot;&quot;;
    }

    .anl-online::before {
      background: var(--brand);
      box-shadow: 0 0 0 3px rgb(67 242 200 / 8%);
    }

    .anl-checking::before {
      border: 2px solid var(--warning);
      border-right-color: transparent;
      animation: anl-spin 900ms linear infinite;
    }

    .anl-offline::before {
      background: var(--danger);
      box-shadow: 0 0 0 3px rgb(255 120 109 / 8%);
    }

    .anl-health-copy {
      margin: var(--s2) 0 0;
      color: var(--text-muted);
      font-size: 11px;
    }

    .anl-note {
      display: flex;
      gap: var(--s2);
      margin-top: var(--s5);
      padding-top: var(--s3);
      border-top: 1px solid var(--border-subtle);
      color: var(--text-muted);
      font-size: 11px;
    }

    .anl-note::before {
      width: 14px;
      height: 2px;
      flex: 0 0 auto;
      margin-top: 7px;
      background: var(--brand);
      content: &quot;&quot;;
    }

    @media (max-width: 760px) {
      .anl-toolbar {
        grid-template-columns: 1fr;
      }

      .anl-controls {
        justify-content: flex-start;
      }

      .anl-navigation-grid {
        grid-template-columns: 1fr;
      }

      .anl-health-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .anl-control-group {
        display: flex;
        width: 100%;
      }

      .anl-control {
        flex: 1 1 auto;
        padding-inline: var(--s2);
      }

      .anl-action-row {
        align-items: stretch;
        flex-direction: column;
      }

      .anl-action-row .anl-button:not(.anl-icon-button) {
        width: 100%;
      }

      .anl-action-row.anl-icon-row {
        align-items: center;
        flex-direction: row;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .anl-button,
      .anl-nav-item,
      .anl-link-target {
        transition: none;
      }

      #action-navigation-lab[data-state=&quot;pressed&quot;] .anl-demo,
      #action-navigation-lab[data-state=&quot;pressed&quot;] .anl-nav-target,
      #action-navigation-lab[data-state=&quot;pressed&quot;] .anl-link-target {
        transform: none;
      }

      .anl-spinner,
      .anl-checking::before,
      #action-navigation-lab[data-state=&quot;loading&quot;] .anl-nav-target::after {
        animation-duration: 1.8s;
      }
    }

    @supports not ((backdrop-filter: blur(1px))) {
      .anl-related {
        background: #1b1b1b;
      }
    }
  &lt;/style&gt;

  &lt;div class=&quot;anl-toolbar&quot;&gt;
    &lt;span class=&quot;anl-kicker&quot;&gt;B03 / Actions + navigation&lt;/span&gt;
    &lt;div class=&quot;anl-controls&quot;&gt;
      &lt;div class=&quot;anl-control-group&quot; aria-label=&quot;Specimen view&quot;&gt;
        &lt;button class=&quot;anl-control&quot; type=&quot;button&quot; data-set=&quot;view&quot; data-value=&quot;actions&quot; aria-pressed=&quot;true&quot;&gt;Actions&lt;/button&gt;
        &lt;button class=&quot;anl-control&quot; type=&quot;button&quot; data-set=&quot;view&quot; data-value=&quot;navigation&quot; aria-pressed=&quot;false&quot;&gt;Links + nav&lt;/button&gt;
        &lt;button class=&quot;anl-control&quot; type=&quot;button&quot; data-set=&quot;view&quot; data-value=&quot;health&quot; aria-pressed=&quot;false&quot;&gt;API health&lt;/button&gt;
      &lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&quot;action-navigation-lab&quot;);
      const stateNotes = {
        default: &quot;Default establishes hierarchy without relying on hover or motion.&quot;,
        hover: &quot;Hover raises contrast and material response without changing component geometry.&quot;,
        focus: &quot;Focus uses the approved 2px mint ring with 3px offset and remains stronger than hover.&quot;,
        pressed: &quot;Pressed is momentary click or keyboard activation feedback, not persistent selection.&quot;,
        selected: &quot;Selected is persistent state language; individual actions use it only when their behavior actually persists.&quot;,
        disabled: &quot;Disabled preserves label recognition while reducing contrast and preventing interaction.&quot;,
        loading: &quot;Loading retains button dimensions, label context, and an explicit progress indicator.&quot;
      };

      root.querySelectorAll(&quot;[data-set]&quot;).forEach((button) =&gt; {
        button.addEventListener(&quot;click&quot;, () =&gt; {
          const property = button.dataset.set;
          const value = button.dataset.value;
          root.dataset[property] = value;
          root.querySelectorAll(`[data-set=&quot;${property}&quot;]`).forEach((peer) =&gt; {
            peer.setAttribute(&quot;aria-pressed&quot;, String(peer === button));
          });
          if (property === &quot;state&quot;) {
            root.querySelector(&quot;[data-state-note]&quot;).textContent = stateNotes[value];
          }
        });
      });
    })();

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
