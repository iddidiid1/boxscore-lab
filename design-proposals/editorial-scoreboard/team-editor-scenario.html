}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&quot;team-editor-scenario&quot;);
  const title = root.querySelector(&quot;.page-title&quot;);
  const description = root.querySelector(&quot;.page-description&quot;);
  const save = root.querySelector(&quot;.save-action&quot;);

  const syncCopy = () =&gt; {
    const create = root.dataset.mode === &quot;create&quot;;
    const submitting = root.dataset.state === &quot;submitting&quot;;
    title.textContent = create ? &quot;Create Team&quot; : &quot;Manage Team&quot;;
    description.textContent = create
      ? &quot;Create a new team profile, ratings, and roster setup.&quot;
      : &quot;Update team identity, ratings, and roster settings.&quot;;
    save.textContent = submitting ? (create ? &quot;Creating…&quot; : &quot;Saving…&quot;) : (create ? &quot;Create Team&quot; : &quot;Save Changes&quot;);
  };

  root.querySelectorAll(&quot;.mode-control&quot;).forEach((button) =&gt; {
    button.addEventListener(&quot;click&quot;, () =&gt; {
      root.dataset.mode = button.dataset.modeValue;
      if (root.dataset.state === &quot;archived&quot; &amp;&amp; root.dataset.mode === &quot;create&quot;) {
        root.dataset.state = &quot;default&quot;;
      }
      root.querySelectorAll(&quot;.mode-control&quot;).forEach((control) =&gt; {
        control.setAttribute(&quot;aria-pressed&quot;, String(control === button));
      });
      root.querySelectorAll(&quot;.state-control&quot;).forEach((control) =&gt; {
        control.setAttribute(&quot;aria-pressed&quot;, String(control.dataset.stateValue === root.dataset.state));
      });
      syncCopy();
    });
  });

  root.querySelectorAll(&quot;.state-control&quot;).forEach((button) =&gt; {
    button.addEventListener(&quot;click&quot;, () =&gt; {
      root.dataset.state = button.dataset.stateValue;
      if (root.dataset.state === &quot;archived&quot;) {
        root.dataset.mode = &quot;edit&quot;;
        root.querySelectorAll(&quot;.mode-control&quot;).forEach((control) =&gt; {
          control.setAttribute(&quot;aria-pressed&quot;, String(control.dataset.modeValue === &quot;edit&quot;));
        });
      }
      root.querySelectorAll(&quot;.state-control&quot;).forEach((control) =&gt; {
        control.setAttribute(&quot;aria-pressed&quot;, String(control === button));
      });
      syncCopy();
    });
  });
})();
&lt;/script&gt;
