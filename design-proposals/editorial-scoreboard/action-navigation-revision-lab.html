  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;body&gt;
&lt;div id=&quot;b03-revision-lab&quot; data-view=&quot;buttons&quot; data-family=&quot;outline&quot; data-density=&quot;compact&quot; data-state=&quot;default&quot;&gt;
  &lt;style&gt;
    #b03-revision-lab {
      --b03-mint: var(--primary);
      --b03-on-mint: var(--primary-foreground);
      --b03-danger: var(--destructive);
      --b03-panel: var(--card);
      --b03-panel-text: var(--card-foreground);
      --b03-soft: color-mix(in srgb, var(--foreground) 7%, transparent);
      --b03-soft-strong: color-mix(in srgb, var(--foreground) 11%, transparent);
      --b03-mint-soft: color-mix(in srgb, var(--primary) 12%, transparent);
      --b03-danger-soft: color-mix(in srgb, var(--destructive) 12%, transparent);
      --b03-line: color-mix(in srgb, var(--foreground) 14%, transparent);
      --b03-line-strong: color-mix(in srgb, var(--foreground) 22%, transparent);
      color: var(--foreground);
      background: transparent;
    }

    #b03-revision-lab * {
      box-sizing: border-box;
    }

    .b03-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding-block: 8px 16px;
      border-bottom: 1px solid var(--border);
    }

    .b03-toolbar-group {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .b03-toolbar-group + .b03-toolbar-group {
      padding-left: 8px;
      border-left: 1px solid var(--border);
    }

    .b03-stage {
      padding-block: 20px 4px;
    }

    .b03-pane {
      display: none;
    }

    #b03-revision-lab[data-view=&quot;buttons&quot;] .b03-pane[data-pane=&quot;buttons&quot;],
    #b03-revision-lab[data-view=&quot;navigation&quot;] .b03-pane[data-pane=&quot;navigation&quot;] {
      display: block;
    }

    .b03-section + .b03-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .b03-section-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .b03-section-head h2,
    .b03-section-head p {
      margin: 0;
    }

    .b03-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .b03-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding-inline: 16px;
      border: 1px solid var(--b03-line);
      border-radius: 4px;
      color: var(--foreground);
      background: transparent;
      font-weight: 500;
      white-space: nowrap;
      transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease, transform 100ms ease;
    }

    .b03-action svg {
      width: 16px;
      height: 16px;
    }

    .b03-primary {
      border-color: color-mix(in srgb, var(--b03-mint) 48%, transparent);
      background: var(--b03-mint);
      color: var(--b03-on-mint);
    }

    .b03-danger {
      border-color: color-mix(in srgb, var(--b03-danger) 34%, transparent);
      color: var(--b03-danger);
    }

    .b03-related svg {
      color: var(--b03-mint);
    }

    #b03-revision-lab[data-family=&quot;surface&quot;] .b03-return {
      background: var(--b03-soft);
    }

    #b03-revision-lab[data-family=&quot;surface&quot;] .b03-danger {
      background: var(--b03-danger-soft);
    }

    #b03-revision-lab[data-family=&quot;surface&quot;] .b03-related {
      border-color: color-mix(in srgb, var(--b03-mint) 22%, transparent);
      background: var(--b03-mint-soft);
    }

    #b03-revision-lab[data-family=&quot;outline&quot;] .b03-related {
      border-color: color-mix(in srgb, var(--b03-mint) 26%, transparent);
    }

    #b03-revision-lab[data-state=&quot;hover&quot;] .b03-action:not(.b03-primary) {
      border-color: var(--b03-line-strong);
      background: var(--b03-soft-strong);
    }

    #b03-revision-lab[data-state=&quot;hover&quot;] .b03-primary {
      filter: brightness(1.07);
    }

    #b03-revision-lab[data-state=&quot;hover&quot;] .b03-danger {
      border-color: color-mix(in srgb, var(--b03-danger) 48%, transparent);
      background: var(--b03-danger-soft);
    }

    #b03-revision-lab[data-state=&quot;focus&quot;] .b03-action,
    #b03-revision-lab[data-state=&quot;focus&quot;] .b03-nav-target {
      outline: 2px solid var(--ring);
      outline-offset: 3px;
    }

    #b03-revision-lab[data-state=&quot;pressed&quot;] .b03-action {
      transform: translateY(1px);
      background-image: linear-gradient(color-mix(in srgb, var(--foreground) 5%, transparent), color-mix(in srgb, var(--foreground) 5%, transparent));
    }

    #b03-revision-lab[data-state=&quot;selected&quot;] .b03-action {
      border-color: color-mix(in srgb, var(--b03-mint) 38%, transparent);
      background: var(--b03-mint-soft);
      color: var(--b03-mint);
    }

    #b03-revision-lab[data-state=&quot;selected&quot;] .b03-primary {
      background: var(--b03-mint);
      color: var(--b03-on-mint);
    }

    #b03-revision-lab[data-state=&quot;disabled&quot;] .b03-action,
    #b03-revision-lab[data-state=&quot;disabled&quot;] .b03-nav-target {
      opacity: .4;
      filter: grayscale(.65);
    }

    .b03-spinner {
      display: none;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: b03-spin 700ms linear infinite;
    }

    #b03-revision-lab[data-state=&quot;loading&quot;] .b03-spinner {
      display: inline-block;
    }

    @keyframes b03-spin {
      to { transform: rotate(360deg); }
    }

    .b03-editor {
      border: 1px solid var(--b03-line);
      border-radius: 10px;
      padding: 16px;
    }

    .b03-local-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .b03-local-header h3 {
      margin: 0;
    }

    .b03-medium {
      min-height: 30px;
      padding-inline: 10px;
    }

    .b03-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding-block: 10px;
      border-bottom: 1px solid var(--border);
    }

    .b03-row:last-child {
      border-bottom: 0;
    }

    .b03-row-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .b03-small,
    .b03-icon {
      min-height: 28px;
      padding-inline: 8px;
    }

    .b03-icon {
      width: 28px;
      min-width: 28px;
      padding-inline: 0;
    }

    #b03-revision-lab[data-density=&quot;tight&quot;] .b03-medium {
      min-height: 28px;
      padding-inline: 8px;
    }

    #b03-revision-lab[data-density=&quot;tight&quot;] .b03-small,
    #b03-revision-lab[data-density=&quot;tight&quot;] .b03-icon {
      min-height: 24px;
    }

    #b03-revision-lab[data-density=&quot;tight&quot;] .b03-icon {
      width: 24px;
      min-width: 24px;
    }

    .b03-density-readout {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .b03-density-readout .viz-badge {
      background: var(--accent);
      color: var(--accent-foreground);
    }

    .b03-nav-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .b03-nav-column h2 {
      margin-top: 0;
    }

    .b03-sidebar {
      min-height: 430px;
      border-right: 1px solid var(--b03-line);
      background: color-mix(in srgb, var(--background) 82%, var(--card));
    }

    .b03-brand {
      padding: 24px 22px 20px;
      border-bottom: 1px solid var(--b03-line);
    }

    .b03-wordmark {
      display: block;
      color: var(--foreground);
      font-weight: 500;
      letter-spacing: .06em;
    }

    .b03-wordmark strong {
      color: var(--b03-mint);
      font-weight: 500;
    }

    .b03-brand .text-small {
      display: block;
      margin-top: 7px;
    }

    .b03-nav-label {
      padding: 20px 22px 8px;
      color: var(--muted-foreground);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .b03-nav-item {
      position: relative;
      display: flex;
      width: 100%;
      align-items: center;
      gap: 10px;
      padding: 13px 22px;
      border-left: 2px solid transparent;
      color: var(--muted-foreground);
    }

    .b03-nav-item svg {
      width: 18px;
      height: 18px;
    }

    .b03-nav-current {
      border-left-color: var(--b03-mint);
      background: var(--b03-mint-soft);
      color: var(--b03-mint);
    }

    #b03-revision-lab[data-state=&quot;hover&quot;] .b03-nav-target {
      background: var(--b03-soft-strong);
      color: var(--foreground);
    }

    #b03-revision-lab[data-state=&quot;pressed&quot;] .b03-nav-target {
      background: var(--b03-mint-soft);
    }

    #b03-revision-lab[data-state=&quot;selected&quot;] .b03-nav-target {
      border-left-color: var(--b03-mint);
      background: var(--b03-mint-soft);
      color: var(--b03-mint);
    }

    .b03-token-aligned .b03-nav-target {
      transition: background-color 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .b03-token-aligned .b03-nav-target:focus-visible {
      outline: 2px solid var(--ring);
      outline-offset: -4px;
    }

    .b03-nav-note {
      margin-bottom: 0;
    }

    .b03-state-note {
      margin: 18px 0 0;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 680px) {
      .b03-nav-grid {
        grid-template-columns: 1fr;
      }

      .b03-toolbar-group + .b03-toolbar-group {
        padding-left: 0;
        border-left: 0;
      }
    }

    @media (max-width: 480px) {
      .b03-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .b03-actions .b03-action {
        width: 100%;
      }

      .b03-row {
        grid-template-columns: 1fr;
      }

      .b03-row-actions {
        flex-wrap: wrap;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .b03-action,
      .b03-token-aligned .b03-nav-target {
        transition: none;
      }

      #b03-revision-lab[data-state=&quot;pressed&quot;] .b03-action {
        transform: none;
      }

      .b03-spinner {
        animation-duration: 1.8s;
      }
    }
  &lt;/style&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&quot;b03-revision-lab&quot;);
      const notes = {
        default: &quot;Default: action hierarchy is visible without hover or motion.&quot;,
        hover: &quot;Hover: contrast changes without changing geometry.&quot;,
        focus: &quot;Focus: the approved mint ring is stronger than hover.&quot;,
        pressed: &quot;Pressed: momentary activation feedback; no persistent material change.&quot;,
        selected: &quot;Selected: reserved for controls with persistent toggle state; navigation uses current-route state.&quot;,
        disabled: &quot;Disabled: semantics remain recognizable while interaction is unavailable.&quot;,
        loading: &quot;Loading: dimensions and labels remain stable while progress is explicit.&quot;
      };

      root.querySelectorAll(&quot;[data-set]&quot;).forEach((control) =&gt; {
        control.addEventListener(&quot;click&quot;, () =&gt; {
          const property = control.dataset.set;
          const value = control.dataset.value;
          root.dataset[property] = value;
          root.querySelectorAll(`[data-set=&quot;${property}&quot;]`).forEach((peer) =&gt; {
            peer.setAttribute(&quot;aria-pressed&quot;, String(peer === control));
            peer.classList.toggle(&quot;btn-primary&quot;, peer === control);
          });

          if (property === &quot;density&quot;) {
            const compact = value === &quot;compact&quot;;
            root.querySelector(&quot;[data-medium-size]&quot;).textContent = compact ? &quot;Medium 30px&quot; : &quot;Medium 28px&quot;;
            root.querySelector(&quot;[data-small-size]&quot;).textContent = compact ? &quot;Small / Icon 28px&quot; : &quot;Small / Icon 24px&quot;;
          }

          if (property === &quot;state&quot;) {

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
