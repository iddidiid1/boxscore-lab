.sr-only {

.btn {

  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

html&gt;body{padding:0}&lt;/style&gt;

&lt;body&gt;
&lt;div id=&quot;foundation-system-lab&quot; data-density=&quot;balanced&quot; data-shape=&quot;precise&quot; data-motion=&quot;normal&quot;&gt;
  &lt;style&gt;
    @import url(&quot;https://fonts.googleapis.com/css2?family=Anton&amp;family=JetBrains+Mono:wght@400;500&amp;family=Space+Grotesk:wght@400;500&amp;display=swap&quot;);

    #foundation-system-lab {
      --canvas: #131313;
      --panel: #1a1a1a;
      --raised: #232323;
      --inset: #0f0f0f;
      --control: #202020;
      --text-strong: #ffffff;
      --text: #dedede;
      --text-soft: #b9b9b9;
      --text-muted: #949494;
      --text-disabled: #666666;
      --brand: #43f2c8;
      --brand-soft: rgb(67 242 200 / 12%);
      --danger: #ff786d;
      --warning: #f4c96b;
      --info: #79b8ff;
      --border-subtle: rgb(255 255 255 / 7.5%);
      --border-structural: rgb(255 255 255 / 13%);
      --border-hover: rgb(255 255 255 / 19%);
      --focus: rgb(67 242 200 / 88%);
      --shadow-popover: 0 14px 36px rgb(0 0 0 / 38%);
      --s1: 4px;
      --s2: 8px;
      --s3: 12px;
      --s4: 16px;
      --s5: 24px;
      --s6: 32px;
      --s7: 48px;
      --radius-control: 4px;
      --radius-compact: 8px;
      --radius-interactive: 10px;
      --radius-panel: 12px;
      --radius-overlay: 12px;
      --duration-fast: 100ms;
      --duration-normal: 160ms;
      --duration-slow: 220ms;
      --ease-standard: cubic-bezier(.2, .8, .2, 1);
      color: var(--text);
      background: var(--canvas);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-panel);
      font-family: &quot;Space Grotesk&quot;, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    #foundation-system-lab[data-density=&quot;compact&quot;] {
      --s2: 6px;
      --s3: 10px;
      --s4: 14px;
      --s5: 20px;
      --s6: 28px;
      --s7: 40px;
    }

    #foundation-system-lab[data-shape=&quot;soft&quot;] {
      --radius-control: 6px;
      --radius-compact: 10px;
      --radius-interactive: 12px;
      --radius-panel: 16px;
      --radius-overlay: 16px;
    }

    #foundation-system-lab[data-motion=&quot;reduced&quot;] {
      --duration-fast: 0ms;
      --duration-normal: 0ms;
      --duration-slow: 0ms;
    }

    #foundation-system-lab * {
      box-sizing: border-box;
    }

    #foundation-system-lab button {
      color: inherit;
      font: inherit;
    }

    #foundation-system-lab button:focus-visible,
    #foundation-system-lab a:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 3px;
    }

    .fsl-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--s4);
      padding: var(--s3) var(--s4);
      border-bottom: 1px solid var(--border-subtle);
      background: var(--inset);
    }

    .fsl-kicker,
    .fsl-token,
    .fsl-label,
    .fsl-state-label,
    .fsl-table-head,
    .fsl-data {
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-variant-numeric: tabular-nums;
    }

    .fsl-kicker,
    .fsl-label,
    .fsl-state-label,
    .fsl-table-head {
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .fsl-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: var(--s2);
    }

    .fsl-control-group {
      display: inline-flex;
      gap: 2px;
      padding: 2px;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-control);
      background: var(--panel);
    }

    .fsl-control {
      min-height: 30px;
      padding: 0 var(--s3);
      border: 0;
      border-radius: calc(var(--radius-control) - 1px);
      background: transparent;
      cursor: pointer;
      color: var(--text-muted);
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 11px;
      transition: color var(--duration-fast), background var(--duration-fast);
    }

    .fsl-control:hover {
      color: var(--text-strong);
      background: var(--raised);
    }

    .fsl-control[aria-pressed=&quot;true&quot;] {
      color: #081510;
      background: var(--brand);
    }

    .fsl-body {
      padding: var(--s6);
    }

    .fsl-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(220px, .75fr);
      gap: var(--s6);
      align-items: end;
      padding-bottom: var(--s6);
      border-bottom: 1px solid var(--border-structural);
    }

    .fsl-eyebrow {
      margin: 0 0 var(--s2);
      color: var(--brand);
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .fsl-title {
      margin: 0;
      color: var(--text-strong);
      font-family: &quot;Anton&quot;, sans-serif;
      font-size: clamp(38px, 7vw, 58px);
      font-weight: 400;
      letter-spacing: -.015em;
      line-height: .98;
      text-transform: uppercase;
    }

    .fsl-summary {
      max-width: 54ch;
      margin: var(--s3) 0 0;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.6;
    }

    .fsl-hero-data {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--border-structural);
      border-bottom: 1px solid var(--border-structural);
    }

    .fsl-hero-stat {
      padding: var(--s3) 0;
    }

    .fsl-hero-stat + .fsl-hero-stat {
      padding-left: var(--s4);
      border-left: 1px solid var(--border-subtle);
    }

    .fsl-hero-stat strong {
      display: block;
      margin-top: var(--s1);
      color: var(--text-strong);
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 20px;
      font-weight: 500;
    }

    .fsl-palette {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      margin: var(--s5) 0;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-compact);
      overflow: hidden;
    }

    .fsl-swatch {
      min-height: 82px;
      padding: var(--s3);
      border-right: 1px solid var(--border-subtle);
    }

    .fsl-swatch:last-child {
      border-right: 0;
    }

    .fsl-swatch span,
    .fsl-swatch code {
      display: block;
    }

    .fsl-swatch span {
      margin-bottom: var(--s1);
      color: var(--text-soft);
      font-size: 12px;
    }

    .fsl-swatch code {
      color: var(--text-strong);
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 11px;
    }

    .fsl-swatch-canvas { background: var(--canvas); }
    .fsl-swatch-panel { background: var(--panel); }
    .fsl-swatch-raised { background: var(--raised); }
    .fsl-swatch-inset { background: var(--inset); }
    .fsl-swatch-text { background: linear-gradient(135deg, var(--text-strong) 0 50%, var(--text-muted) 50%); }
    .fsl-swatch-brand { background: var(--brand); }
    .fsl-swatch-text span,
    .fsl-swatch-text code,
    .fsl-swatch-brand span,
    .fsl-swatch-brand code {
      color: #0d1714;
    }

    .fsl-specimen-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(230px, .65fr);
      gap: var(--s5);
    }

    .fsl-panel {
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-panel);
      background: var(--panel);
      overflow: hidden;
    }

    .fsl-panel-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--s3);
      padding: var(--s4) var(--s4) var(--s3);
      border-bottom: 1px solid var(--border-structural);
    }

    .fsl-section-title {
      margin: 0;
      color: var(--text-strong);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -.01em;
    }

    .fsl-panel-head p {
      margin: var(--s1) 0 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .fsl-live {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--text-soft);
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 11px;
    }

    .fsl-live::before {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--brand);
      content: &quot;&quot;;
    }

    .fsl-table-head,
    .fsl-table-row {
      display: grid;
      grid-template-columns: 44px minmax(120px, 1.5fr) minmax(90px, .8fr) 72px 72px;
      align-items: center;
      gap: var(--s3);
      padding: var(--s2) var(--s4);
    }

    .fsl-table-head {
      min-height: 34px;
      background: var(--inset);
    }

    .fsl-table-row {
      min-height: 52px;
      border-top: 1px solid var(--border-subtle);
      transition: background var(--duration-normal), box-shadow var(--duration-normal);
    }

    .fsl-table-row:hover {
      background: var(--raised);
    }

    .fsl-rank {
      color: var(--text-muted);
    }

    .fsl-player {
      min-width: 0;
    }

    .fsl-player strong,
    .fsl-player span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fsl-player strong {
      color: var(--text-strong);
      font-weight: 500;
    }

    .fsl-player span {
      color: var(--text-muted);
      font-size: 12px;
    }

    .fsl-data {
      color: var(--text);
      text-align: right;
    }

    .fsl-data-primary {
      color: var(--brand);
      font-weight: 500;
    }

    .fsl-type-list {
      padding: var(--s4);
    }

    .fsl-type-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: var(--s3);
      align-items: baseline;
      padding: var(--s3) 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .fsl-type-row:first-child {
      padding-top: 0;
    }

    .fsl-type-row:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .fsl-type-display {
      color: var(--text-strong);
      font-family: &quot;Anton&quot;, sans-serif;
      font-size: 30px;
      line-height: 1;
      text-transform: uppercase;
    }

    .fsl-type-heading {
      color: var(--text-strong);
      font-size: 18px;
      font-weight: 500;
    }

    .fsl-type-body {
      color: var(--text);
      font-size: 15px;
    }

    .fsl-type-control {
      color: var(--text-strong);
      font-size: 14px;
      font-weight: 500;
    }

    .fsl-type-meta {
      color: var(--text-muted);
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .fsl-type-data {
      color: var(--brand);
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 22px;
      font-variant-numeric: tabular-nums;
    }

    .fsl-foundation-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      margin-top: var(--s5);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-compact);
      background: var(--border-subtle);
      overflow: hidden;
    }

    .fsl-foundation-cell {
      min-height: 116px;
      padding: var(--s4);
      background: var(--panel);
    }

    .fsl-foundation-cell strong {
      display: block;
      margin: var(--s2) 0 var(--s1);
      color: var(--text-strong);
      font-weight: 500;
    }

    .fsl-foundation-cell p {
      margin: 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .fsl-focus-demo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      margin-top: var(--s3);
      padding: 0 var(--s3);
      border: 1px solid var(--border-structural);
      border-radius: var(--radius-control);
      outline: 2px solid var(--focus);
      outline-offset: 3px;
      background: var(--control);
      color: var(--text-strong);
    }

    .fsl-radius-demo {
      display: flex;
      gap: var(--s2);
      margin-top: var(--s3);

    .fsl-radius-demo i {

    .fsl-radius-demo i:nth-child(1) { border-radius: var(--radius-control); }
    .fsl-radius-demo i:nth-child(2) { border-radius: var(--radius-compact); }

      width: 38%;
      height: 100%;
      background: var(--brand);
      content: &quot;&quot;;
      transition: width var(--duration-slow) var(--ease-standard);
    }

    .fsl-foundation-cell:hover .fsl-motion-demo::after {
      width: 78%;
    }

    .fsl-breakpoints {
      display: flex;
      gap: 2px;
      margin-top: var(--s3);
    }

    .fsl-breakpoints span {
      display: grid;
      min-height: 30px;
      place-items: center;
      background: var(--raised);
      color: var(--text-soft);
      font-family: &quot;JetBrains Mono&quot;, monospace;
      font-size: 10px;
    }

    .fsl-breakpoints span:nth-child(1) { flex: 56; }
    .fsl-breakpoints span:nth-child(2) { flex: 20; }
    .fsl-breakpoints span:nth-child(3) { flex: 22; }

    .fsl-footer {
      display: flex;
      justify-content: space-between;
      gap: var(--s4);
      margin-top: var(--s5);
      padding-top: var(--s4);
      border-top: 1px solid var(--border-subtle);
      color: var(--text-muted);
      font-size: 12px;
    }

    .fsl-footer strong {
      color: var(--text-soft);
      font-weight: 500;
    }

    @media (max-width: 760px) {
      .fsl-toolbar,
      .fsl-hero,
      .fsl-footer {
        align-items: stretch;
        flex-direction: column;
      }

      .fsl-toolbar {
        display: flex;
      }

      .fsl-controls {
        justify-content: flex-start;
      }

      .fsl-hero,
      .fsl-specimen-grid {
        grid-template-columns: 1fr;
      }

      .fsl-palette {
        grid-template-columns: repeat(3, 1fr);
      }

      .fsl-swatch:nth-child(3) {
        border-right: 0;
      }

      .fsl-swatch:nth-child(-n + 3) {
        border-bottom: 1px solid var(--border-subtle);
      }

      .fsl-foundation-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 560px) {
      .fsl-body {
        padding: var(--s4);
      }

      .fsl-control-group {
        flex: 1 1 auto;
      }

      .fsl-control {
        flex: 1;
        padding-inline: var(--s2);
      }

      .fsl-palette {
        grid-template-columns: repeat(2, 1fr);
      }

      .fsl-swatch:nth-child(2n) {
        border-right: 0;
      }

      .fsl-swatch:nth-child(3) {
        border-right: 1px solid var(--border-subtle);
      }

      .fsl-swatch:nth-child(-n + 4) {
        border-bottom: 1px solid var(--border-subtle);
      }

      .fsl-table-head,
      .fsl-table-row {
        grid-template-columns: 34px minmax(108px, 1fr) 62px 62px;
      }

      .fsl-table-head &gt; :nth-child(3),
      .fsl-table-row &gt; :nth-child(3) {
        display: none;
      }

      .fsl-foundation-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #foundation-system-lab {
        --duration-fast: 0ms;
        --duration-normal: 0ms;
        --duration-slow: 0ms;
      }
    }
  &lt;/style&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
